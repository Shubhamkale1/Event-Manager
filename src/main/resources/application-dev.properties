# MySQL — local
spring.datasource.url               =   jdbc:mysql://localhost:3306/eventdb?createDatabaseIfNotExist=true
spring.datasource.username          =
spring.datasource.password          =   
spring.datasource.driver-class-name =   com.mysql.cj.jdbc.Driver

# JPA — verbose in dev
spring.jpa.hibernate.ddl-auto               =   validate
spring.jpa.show-sql                         =   true
spring.jpa.properties.hibernate.format_sql  =   true

# Spring AI — Anthropic
spring.ai.anthropic.api-key                 =   your-anthropic-api-key
spring.ai.anthropic.chat.options.model      =   claude-opus-4-5
spring.ai.anthropic.chat.options.max-tokens =   1024

# Redis — local
spring.data.redis.host = localhost
spring.data.redis.port = 6379

# Elasticsearch — local (CORRECTED: Added 's' to https)
spring.elasticsearch.uris               =   http://localhost:9200
spring.elasticsearch.socket-timeout     =   30s
spring.elasticsearch.connection-timeout =   10s

# MailSlurp SMTP Settings (CORRECTED: Values from Screenshot 381)
spring.mail.host    =   sandbox.smtp.mailtrap.io
spring.mail.port    =   2525
spring.mail.username=
spring.mail.password=   

spring.mail.properties.mail.smtp.auth           =   true
spring.mail.properties.mail.smtp.starttls.enable=   true

app.jwt.secret      =
app.jwt.expiration  =   86400000

# # Spring AI
spring.ai.openai.api-key                =
spring.ai.openai.base-url               =   https://api.groq.com/openai
spring.ai.openai.chat.options.model     =   llama3-8b-8192
spring.ai.openai.chat.options.max-tokens=   900

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id     =
spring.security.oauth2.client.registration.google.client-secret =   
spring.security.oauth2.client.registration.google.scope         =   email,profile
spring.security.oauth2.client.registration.google.redirect-uri  =   http://localhost:8081/login/oauth2/code/google


# Geocoding — get free API key from geocode.maps.co
app.geocoding.api-key   =


# Cache TTL in seconds
app.cache.ttl   =   300

# Server
server.port =   8081