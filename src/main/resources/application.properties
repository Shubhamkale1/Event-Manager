# H2 in-memory database
# MySQL — replaces H2

spring.profiles.active=dev


spring.datasource.url=jdbc:mysql://localhost:3306/eventdb?createDatabaseIfNotExist=true
#spring.datasource.username=${DB_USERNAME}
spring.datasource.username=root
spring.datasource.password=shubham
#spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — validate only, Flyway handles schema now
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway — enabled by default when dependency is present
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Disable Spring Security's default generated password log
logging.level.org.springframework.security=WARN

# Silence the open-in-view warning
spring.jpa.open-in-view=false

# Server
server.port=8081

logging.level.org.springframework.data.elasticsearch=DEBUG
